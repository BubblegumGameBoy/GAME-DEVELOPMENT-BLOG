/* ========================================================================= */
let phaseIdx=0, lastNo=0, lastLen=0, lastSlow=false;
let awaitingPost=false, lastDate="2004/01/08 22:38", pending=null;
const seqMap={};  // 台本の原典番号 → 実際の通し番号
let player={id:randId()};
const DEFAULT_PH="本文を書いて「書き込む」";

const $thread=document.getElementById('thread');
const $inter =document.getElementById('interaction');
const $count =document.getElementById('res-count');
const $clock =document.getElementById('clock');
const $body  =document.getElementById('body-in');
const $form  =document.getElementById('post-form');
function scrollBottom(){window.scrollTo(0,document.body.scrollHeight);}

function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function anchors(t,remap){
  return t.replace(/&gt;&gt;(\d+)/g,(m,num)=>{
    let n=+num; if(remap && seqMap[n]!=null) n=seqMap[n];
    return '<span class="anchor">&gt;&gt;'+n+'</span>';
  });
}
function renderImg(img){
  if(!img) return '';
  if(typeof img==='object' && img.src){           // 実画像のみ。読み込めなければ何も出さない
    return `<div class="scene-wrap"><img class="scene" src="${esc(encodeURI(img.src))}" alt="" loading="lazy"`+
           ` onerror="this.closest('.scene-wrap').remove()"></div>`;
  }
  return '';
}
function hhmm(d){const m=d.match(/(\d{1,2}):(\d{2})/);return m?m[1].padStart(2,'0')+':'+m[2]:'';}

function renderRes(p,isMe){
  const n=++lastNo;                       // 通し番号（連番）
  if(p.no!=null) seqMap[p.no]=n;          // 原典番号→通し番号の対応を記録
  const date=p.date||lastDate; lastDate=date;
  const sage=(p.mail||'').toLowerCase()==='sage';
  const cls=['res']; if(isMe)cls.push('me'); if(p.op)cls.push('op');
  const trip=p.trip?`<span class="trip"> ${esc(p.trip)}</span>`:'';
  const body=anchors(esc(p.body), p.no!=null);
  const img=renderImg(p.img);
  const el=document.createElement('div'); el.className=cls.join(' ');
  el.innerHTML=
    `<div class="res-meta"><span class="num">${n}</span>`+
    `<span class="label"> 名前：</span><span class="name ${sage?'sage':'age'}">${esc(p.name)}</span>${trip}`+
    `<span class="label"> 投稿日：</span><span class="date">${esc(date)}</span> `+
    `<span class="id">ID:${p.id||randId()}</span></div>`+
    `<div class="res-body">${body}${img}</div>`;
  $thread.appendChild(el);
  $count.textContent=`全${n}件`;
  $clock.textContent='現在 '+hhmm(date);
  scrollBottom();
}

function delayFor(){
  let d=Math.min(PACE.maxDelay, PACE.readBase + lastLen*PACE.msPerChar);
  if(lastSlow) d*=PACE.slowMul;
  return Math.max(PACE.minDelay, d) + Math.random()*250;
}
function clearPending(){ if(pending){clearTimeout(pending.timer); pending=null;} }

function playPhase(){
  const phase=SCRIPT[phaseIdx]; if(!phase) return;
  awaitingPost=false; $form.classList.remove('awaiting'); $body.placeholder=DEFAULT_PH; $inter.innerHTML='';
  let i=0;
  const typing=document.createElement('div'); typing.className='typing';
  typing.innerHTML='……誰かが書き込んでいる……';
  const reveal=()=>{
    clearPending(); typing.remove();
    const p=phase.posts[i];
    renderRes(p,false);
    lastLen=[...(p.body||'')].length; lastSlow=!!p.slow;
    i++; schedule();
  };
  const schedule=()=>{
    if(i<phase.posts.length){
      $inter.appendChild(typing); scrollBottom();
      pending={reveal, timer:setTimeout(reveal, delayFor())};
    } else {
      typing.remove();
      openGate(phase);
    }
  };
  schedule();
}

function openGate(phase){
  $inter.innerHTML='';
  if(phase.end){
    if(phase.endNote){
      const e=document.createElement('div'); e.className='endnote';
      e.textContent=phase.endNote.replace('{TRIP}', OP.trip); $inter.appendChild(e);
    }
    $form.classList.remove('awaiting'); $body.placeholder=DEFAULT_PH; scrollBottom();
    return;
  }
  // 自分の番：コメント欄を薄い黄色でハイライトし、心の声をプレースホルダに出す
  awaitingPost=true; $form.classList.add('awaiting');
  $body.placeholder = phase.think ? phase.think.replace(/[（）]/g,'') : DEFAULT_PH;
  $body.focus(); scrollBottom();
}

function submitPost(text){
  text=(text||'').trim(); if(!text) return;
  const mail=document.getElementById('mail-in').value.trim();
  const name=document.getElementById('name-in').value.trim()||NONAME;
  renderRes({name,id:player.id,mail,date:lastDate,body:text},true);
  lastLen=[...text].length; lastSlow=false;
  $body.value='';
  if(awaitingPost){
    awaitingPost=false; $form.classList.remove('awaiting'); $body.placeholder=DEFAULT_PH; $inter.innerHTML='';
    phaseIdx++; setTimeout(playPhase,PACE.afterPost);
  }
}

$form.addEventListener('submit',e=>{e.preventDefault();submitPost($body.value);});

/* タップ／クリック／スペース・Enterで待ち時間を飛ばして次のレスへ */
document.addEventListener('click',e=>{
  if(e.target.closest('#post-form')||e.target.closest('#gate')) return;
  if(pending) pending.reveal();
});
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
  if((e.key===' '||e.key==='Enter')&&pending){e.preventDefault();pending.reveal();}
});

document.getElementById('gate-go').addEventListener('click',()=>{
  const v=document.getElementById('gate-name').value.trim();
  document.getElementById('name-in').value=v||NONAME;
  document.getElementById('gate').style.display='none';
  playPhase();
});
document.getElementById('gate-name').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('gate-go').click();});
</script>
